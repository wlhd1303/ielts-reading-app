# Driver MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# JPA / HIBERNATE CONFIGURATION
# ==============================================================

# Tự động cập nhật cấu trúc bảng dựa trên các file Entity Java
spring.jpa.hibernate.ddl-auto=update

# Hiển thị các câu lệnh SQL ra Console để dễ theo dõi lỗi
spring.jpa.show-sql=true

# Sử dụng Dialect của MySQL để Hibernate tối ưu câu lệnh
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Cho phép Hibernate định nghĩa các kiểu dữ liệu như TEXT (cho nội dung dài)
spring.jpa.open-in-view=false