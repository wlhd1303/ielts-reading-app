# URL kết nối: Sử dụng host và port từ TiDB. Lưu ý dùng database 'test' hoặc 'english_reading_db' 
# thay vì 'sys' để tránh lỗi quyền ghi dữ liệu.
spring.datasource.url=jdbc:mysql://gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/test?sslMode=VERIFY_IDENTITY

# Thông tin đăng nhập
spring.datasource.username=3ePfUxNP8cUUSyu.root
